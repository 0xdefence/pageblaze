name: pageblaze-ci

on:
  push:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/**'
      - 'docs/contracts/**'
      - '.github/workflows/pageblaze-ci.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/**'
      - 'docs/contracts/**'

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate contracts
        run: npm run contracts:check
